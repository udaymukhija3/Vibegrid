name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Go backend
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: vibegrid
          POSTGRES_PASSWORD: vibegrid
          POSTGRES_DB: vibegrid_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: backend/go.sum

      - name: Check formatting
        run: test -z "$(gofmt -l .)" || (gofmt -l . && exit 1)

      - name: Vet
        run: go vet ./...

      - name: Test (race detector + Postgres)
        env:
          TEST_DATABASE_URL: postgres://vibegrid:vibegrid@localhost:5432/vibegrid_test?sslmode=disable
        run: go test -race ./...

  frontend:
    name: Next.js frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
