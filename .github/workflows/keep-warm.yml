name: keep-warm

# Render's free tier spins the service down after ~15 min idle. The next visitor
# then triggers a ~20-30s cold start (boot + seed + cross-region DB connect),
# which exceeds the frontend's 8s API timeout and shows "Loading today's grid…".
# This cron pings /healthz so the instance stays awake and visitors never hit a
# cold start. /healthz is the cheap liveness check (no DB work).
#
# Note: GitHub schedules are best-effort and can be delayed under load, and are
# auto-disabled after 60 days with no repo commits. For stricter uptime, also add
# a free external monitor (e.g. cron-job.org / UptimeRobot) on the same URL.
on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: keep-warm
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /healthz
        env:
          URL: https://vibegrid.onrender.com/healthz
        run: |
          for attempt in 1 2 3; do
            code=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 60 "$URL") || true
            echo "attempt $attempt -> HTTP ${code:-000}"
            if [ "$code" = "200" ]; then
              exit 0
            fi
            echo "retrying in 15s…"
            sleep 15
          done
          echo "keep-warm ping failed after 3 attempts"
          exit 1
